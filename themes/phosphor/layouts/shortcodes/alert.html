{{- $type := .Get 0 | default "warning" -}}

{{- $icons := dict
  "warning" "alert-warning"
  "info"    "alert-info"
  "tip"     "alert-tip"
  "danger"  "alert-danger"
-}}

{{- $iconName := index $icons $type | default "alert-warning" -}}

<div class="alert alert-{{ $type }}">
  <span class="alert-icon">
    {{ partial "icon.html" $iconName }}
  </span>
  <div>
    {{ .Page.RenderString .Inner }}
  </div>
</div>
